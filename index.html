<!DOCTYPE html>
<html lang="pl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Docs</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="loginScreen" class="screen active center">

<h1>Mobile Docs</h1>

<input id="loginName" placeholder="Imię">
<input id="loginPass" type="password" placeholder="Hasło">

<button onclick="login()">Zaloguj</button>

</div>


<div id="appScreen" class="screen">

<header>
Moje dokumenty
</header>

<div class="container">

<div id="home">

<div class="profile">

<img src="https://i.pravatar.cc/150">

<div>
<b>Jan Kowalski</b><br>
<small>Profil użytkownika</small>
</div>

</div>

<div class="card">

<b>Dowód osobisty</b>

<div class="number">
ABA 123456
</div>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=dowod">

</div>

<div class="card">

<b>Prawo jazdy</b>

<div class="number">
PJ 456789
</div>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=prawojazdy">

</div>

</div>


<div id="profile" class="hidden">

<h2>Profil</h2>

<p>Imię: Jan</p>
<p>Nazwisko: Kowalski</p>
<p>PESEL: 00000000000</p>

<button onclick="toggleDarkMode()">🌙 Tryb ciemny</button>

</div>

</div>

<div class="menu">

<button onclick="show('home')">
🏠
</button>

<button onclick="show('profile')">
👤
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
