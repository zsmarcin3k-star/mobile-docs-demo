<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mobile Docs</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div id="login" class="screen active center">

<img src="logo.svg" class="logo">

<h1>Mobile Docs</h1>

<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Hasło">

<button onclick="login()">Zaloguj</button>

<p class="demo">demo: wpisz cokolwiek</p>

</div>


<div id="app" class="screen">

<header>

<img src="logo.svg" class="headerLogo">

<span>Moje dokumenty</span>

</header>


<div class="container">

<div id="home">

<div class="profile">

<img src="https://i.pravatar.cc/150">

<div>

<b>Jan Kowalski</b><br>
<small>Profil użytkownika</small>

</div>

</div>


<div class="card">

<div class="cardTitle">

Dowód osobisty

</div>

<div class="number">

ABA 123456

</div>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=dowod">

</div>


<div class="card">

<div class="cardTitle">

Prawo jazdy

</div>

<div class="number">

PJ 987654

</div>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=pj">

</div>

</div>



<div id="profile" class="hidden">

<h2>Profil</h2>

<p>Imię: Jan</p>
<p>Nazwisko: Kowalski</p>
<p>PESEL: 00000000000</p>

<button onclick="toggleDark()">🌙 Tryb ciemny</button>

<button onclick="logout()">Wyloguj</button>

</div>


</div>


<div class="menu">

<button onclick="show('home')">
🏠
</button>

<button onclick="show('profile')">
👤
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
