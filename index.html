<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moje Dokumenty</title>

<style>

body{
margin:0;
font-family: Arial;
background:#f2f4f7;
}

.phone{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
position:relative;
box-shadow:0 0 20px rgba(0,0,0,0.15);
}

header{
background:#0b5cff;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
padding-bottom:90px;
}

.profile{
display:flex;
align-items:center;
background:white;
border-radius:15px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.profile img{
width:65px;
height:65px;
border-radius:50%;
margin-right:15px;
}

.card{
background:#0b5cff;
color:white;
border-radius:16px;
padding:20px;
margin-bottom:15px;
position:relative;
overflow:hidden;
}

.card small{
opacity:0.8;
}

.card-number{
margin-top:10px;
font-size:18px;
letter-spacing:2px;
}

.qr{
position:absolute;
right:15px;
bottom:15px;
width:60px;
}

.menu{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:white;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #ddd;
}

.menu button{
background:none;
border:none;
font-size:14px;
cursor:pointer;
}

.screen{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<div class="phone">

<header>
Moje dokumenty
</header>

<div class="container">

<div id="home" class="screen active">

<div class="profile">
<img src="https://i.pravatar.cc/150">
<div>
<b>Jan Kowalski</b><br>
<small>Profil użytkownika</small>
</div>
</div>

<div class="card">
<b>Dowód osobisty</b><br>
<small>Dokument tożsamości</small>

<div class="card-number">
ABA 123456
</div>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=demo">
</div>

<div class="card">
<b>Prawo jazdy</b><br>
<small>Kategoria B</small>

<div class="card-number">
PJ 567890
</div>

<img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=prawojazdy">
</div>

</div>


<div id="documents" class="screen">

<h3>Twoje dokumenty</h3>

<div class="card">
<b>Legitymacja studencka</b><br>
<small>Status: aktywna</small>
</div>

<div class="card">
<b>Karta pojazdu</b><br>
<small>Volkswagen Golf</small>
</div>

</div>


<div id="profile" class="screen">

<h3>Profil</h3>

<p><b>Imię:</b> Jan</p>
<p><b>Nazwisko:</b> Kowalski</p>
<p><b>PESEL:</b> 00000000000</p>

</div>

</div>

<div class="menu">

<button onclick="show('home')">
🏠<br>Home
</button>

<button onclick="show('documents')">
📄<br>Dokumenty
</button>

<button onclick="show('profile')">
👤<br>Profil
</button>

</div>

</div>

<script>

function show(id){

let screens=document.querySelectorAll(".screen");

screens.forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

</script>

</body>
</html>
